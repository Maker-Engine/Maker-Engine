name: Build

on:
  push:
   branches: [ main ]
  pull_request:

jobs:

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install libraries
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet

      - name: Setup Lime
        run: |
          haxelib run lime setup

      - name: Build Windows
        run: |
          haxelib run lime build windows -release

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: MakerEngine-Windows
          path: export/windows/bin

  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install libraries
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install extension-androidtools --quiet

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;25.2.9519653"

      - name: Set Android Environment
        run: |
          echo "ANDROID_SDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Lime Android
        run: |
          haxelib run lime setup android

      - name: Build Android
        run: |
          haxelib run lime build android -release

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: MakerEngine-Android
          path: export/android/bin